spring.application.name=payments-api

# Redis Configuration for Idempotency
spring.data.redis.host=redis
spring.data.redis.port=6379

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.ledger.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ledger.failureRateThreshold=50
resilience4j.circuitbreaker.instances.ledger.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.ledger.permittedNumberOfCallsInHalfOpenState=3
